<section id="projects-section"
    class="relative min-h-screen w-full py-24 bg-transparent flex flex-col items-center justify-center">

    <div class="p-header w-full max-w-[1200px] px-6 md:px-8 mb-12 text-left">
        <p class="text-[10px] tracking-[0.5em] text-[#00dbe7] uppercase font-bold mb-2">Showcase</p>
        <h2 class="s-anim font-title text-[24px] md:text-[40px] tracking-[0.04em] md:tracking-[0.15em] text-white uppercase leading-[1.15]">
            Proyectos <br> <span class="text-[#00dbe7]">Seleccionados</span>
        </h2>
    </div>

    <div
        class="p-grid w-full max-w-[1200px] px-6 md:px-8 grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-5 auto-rows-[280px]">

        <div *ngFor="let p of projects"
            class="p-card group relative rounded-xl overflow-hidden bg-[#050505] border border-white/5" [ngClass]="{
           'md:col-span-2 md:row-span-1': p.size === 'wide',
           'md:col-span-1 md:row-span-1': p.size === 'square'
         }">

            <div class="absolute inset-0 z-0 overflow-hidden">
                <div class="w-full h-full bg-center bg-cover transition-transform duration-[1.2s] ease-out group-hover:scale-105 opacity-30 group-hover:opacity-50"
                    [style.backgroundImage]="'url(' + p.image + ')'">
                </div>
            </div>

            <div class="absolute inset-0 z-10 bg-gradient-to-t from-black/90 via-black/40 to-transparent"></div>

            <div class="relative z-20 h-full p-6 md:p-8 flex flex-col justify-between items-start text-left">

                <div class="w-full flex justify-between items-start">
                    <span
                        class="font-title text-[10px] text-[#00dbe7] tracking-widest border border-[#00dbe7]/30 px-2 py-1 rounded-sm bg-[#00dbe7]/5">
                        {{ p.id }}
                    </span>
                    <span
                        class="material-symbols-outlined text-white/20 group-hover:text-white transition-colors text-[20px] -rotate-45 group-hover:rotate-0 duration-500">
                        arrow_forward
                    </span>
                </div>

                <div class="w-full">
                    <h3 class="font-title text-[18px] md:text-[22px] text-white uppercase tracking-wider mb-2">
                        {{ p.title }}
                    </h3>

                    <div
                        class="grid grid-rows-[0fr] group-hover:grid-rows-[1fr] transition-all duration-500 ease-in-out">
                        <p
                            class="overflow-hidden font-body text-[11px] text-white/50 tracking-widest uppercase font-light leading-relaxed mb-4">
                            {{ p.description }}
                        </p>
                    </div>

                    <div class="flex flex-wrap gap-2 mt-2">
                        <span *ngFor="let tag of p.tags"
                            class="px-2 py-[2px] text-[8px] md:text-[9px] tracking-[0.2em] uppercase border border-white/10 bg-black/40 text-white/60 rounded backdrop-blur-sm">
                            {{ tag }}
                        </span>
                    </div>
                </div>

            </div>

            <div
                class="absolute top-0 right-0 w-full h-full bg-gradient-to-br from-[#00dbe7]/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-700 pointer-events-none">
            </div>
        </div>

    </div>
</section>
