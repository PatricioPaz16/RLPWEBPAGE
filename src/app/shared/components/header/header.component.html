<header class="bg-surface/60 backdrop-blur-xl sticky top-0 z-50 border-b border-white/10 shadow-sm">
  <nav class="flex justify-between items-center w-full px-xl py-md max-w-container-max mx-auto">
    <!-- Logo -->
    <div class="text-headline-md font-headline-md font-bold tracking-tighter text-primary-fixed-dim">
      RLP
    </div>

    <!-- Navigation Links - Desktop -->
    <div class="hidden md:flex items-center gap-md">
      <a
        *ngFor="let link of navLinks"
        [href]="link.href"
        (click)="onNavClick(link)"
        [ngClass]="{
          'text-primary-fixed-dim border-b-2 border-primary-fixed-dim pb-1': link.isActive,
          'text-on-surface-variant hover:text-primary-fixed-dim': !link.isActive
        }"
        class="font-body-md transition-colors duration-300"
      >
        {{ link.label }}
      </a>
    </div>

    <!-- CTA Button -->
    <button
      class="bg-primary-fixed-dim text-on-primary px-md py-sm rounded-lg font-label-caps text-label-caps font-bold hover:brightness-110 active:scale-95 transition-all duration-200"
    >
      Cotizar Proyecto
    </button>
  </nav>
</header>
