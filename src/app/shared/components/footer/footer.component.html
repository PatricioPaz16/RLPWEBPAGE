<footer class="bg-[#050505] border-t border-white/5 relative pt-32 pb-12 overflow-hidden">
  <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-[800px] h-[300px]  rounded-full pointer-events-none"></div>

  <div class="flex flex-col md:flex-row justify-between items-start w-full px-8 md:px-16 max-w-[1400px] mx-auto gap-16 relative z-10">
    
    <div class="max-w-xs group">
      <div class="font-title text-4xl text-white mb-8 tracking-[0.2em] group-hover:text-[#00dbe7] transition-colors duration-500">
        RLP
      </div>
      <p class="text-[11px] text-white/40 mb-10 leading-relaxed font-light tracking-widest uppercase">
        Engineering Excellence. Diseñamos y construimos infraestructuras de software críticas para mercados globales competitivos.
      </p>
      
      <div class="flex gap-8">
        <a *ngFor="let social of socialLinks" [href]="social.href" class="social-icon" [attr.aria-label]="social.label">
          <span class="material-symbols-outlined text-white/20 hover:text-[#00dbe7] transition-all duration-300 text-[22px]">
            {{ social.icon }}
          </span>
        </a>
      </div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-3 gap-16 md:gap-32 w-full md:w-auto">
      <div *ngFor="let section of footerSections">
        <h6 class="font-title text-[9px] text-[#00dbe7]/60 tracking-[0.4em] mb-8 uppercase font-bold">
          {{ section.title }}
        </h6>
        <ul class="space-y-5">
          <li *ngFor="let link of section.links">
            <a [href]="link.href"
               class="text-[12px] text-white/40 hover:text-white transition-all footer-link tracking-widest uppercase font-light">
              {{ link.label }}
            </a>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <div class="w-full px-8 md:px-16 mt-32 pt-10 border-t border-white/5 flex flex-col md:row justify-between items-center max-w-[1400px] mx-auto text-[9px] text-white/20 tracking-[0.3em] uppercase">
    <div class="flex items-center gap-2">
      <div class="w-1.5 h-1.5 rounded-full bg-[#00dbe7] animate-pulse"></div>
      © {{ currentYear }} RLP Software Factory. All rights reserved.
    </div>
    
    <div class="flex gap-10 mt-6 md:mt-0 items-center">
      <div class="flex items-center gap-3">
        <span class="opacity-50">Coverage:</span>
        <span class="text-white/40">Latam / Global</span>
      </div>
    </div>
  </div>
</footer>
